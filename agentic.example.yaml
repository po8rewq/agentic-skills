project:
  name: my-api
  default_branch: main
editor: "code --wait"
runtime:
  pipeline: default
  skills_dir: .ai/skills
  artifacts_dir: .ai/runs
providers:
  default: claude-code
  available:
    claude-code: {command: claude}
    codex: {command: "codex exec"}
models:
  aliases: {cheap: claude-haiku-4-5, coding: gpt-5.1-codex, best: claude-opus-4-6}
  by_stage:
    requirements: cheap
    architecture: best
    implementation: coding
    review: best
    fix-review: coding
commands:
  install: pnpm install
  lint: pnpm lint
  typecheck: pnpm typecheck
  test: pnpm test
  build: pnpm build
context:
  dir: .ai/context
  requirements: []
  architecture:
    - repo-map.md
    - module-boundaries.md
    - test-commands.md
    - coding-conventions.md
    - dangerous-areas.md
    - dependency-map.md
    - ownership.md
  implementation:
    - repo-map.md
    - test-commands.md
    - coding-conventions.md
    - dangerous-areas.md
  review:
    - repo-map.md
    - module-boundaries.md
    - test-commands.md
    - coding-conventions.md
    - dangerous-areas.md
    - dependency-map.md
memory:
  dir: .ai/memory
  requirements:
    - decisions.md
    - known-issues.md
  architecture:
    - decisions.md
    - preferred-patterns.md
    - known-issues.md
  implementation:
    - preferred-patterns.md
    - lessons-learned.md
    - known-issues.md
  review:
    - recurring-review-comments.md
    - known-issues.md
    - decisions.md
vcs:
  type: git
  require_clean_worktree: true
  branch_prefix: ai/
forge:
  provider: github
  create_pr: true
  auto_commit_push: false
  labels: [ai-generated]
  reviewers: []
gates:
  require_approval_after: [requirements, architecture]
  require_tests_before_review: true
  block_on_review_findings: [blocking, security]
risk_routing:
  default_level: low
  implementation_models:
    low: coding
    medium: coding
    high: best
    critical: best
  review_passes:
    low: [correctness, tests]
    medium: [correctness, architecture, tests]
    high: [correctness, architecture, security, tests]
    critical: [correctness, architecture, security, tests, migration_or_rollback]
  require_human_approval: [high, critical]
  require_manual_merge: [critical]
  keyword_fallback:
    level: high
    high_risk_keywords: [auth, authorization, billing, payment, migration, encryption, concurrency, data loss]
