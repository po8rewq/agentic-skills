steps:
  - id: requirements
    skill: requirements
    output: requirements.md
  - id: review-requirements
    type: artifact_review
    skill: review-requirements
    inputs: [requirements.md]
    output: requirements-review.md
    target_stage: requirements
    approval: true
    context_stage: review
    model_stage: review
  - id: implementation
    skill: implementation
    inputs: [requirements.md, repo_context]
    output: implementation-notes.md
  - id: checks
    type: command_group
    commands: [lint, test]
  - id: review
    type: review_group
    inputs: [requirements.md, git_diff, test_results]
    output: review.md
